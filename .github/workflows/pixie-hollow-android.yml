name: Build Pixie Hollow Android

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - "pixie-hollow-android/**"
      - ".github/workflows/pixie-hollow-android.yml"
  push:
    branches: [master]
    paths:
      - "pixie-hollow-android/**"
      - ".github/workflows/pixie-hollow-android.yml"

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: r27
  CARGO_NDK_VERSION: 4.1.2
  RUFFLE_ANDROID_COMMIT: 1bcf30e76e86d535a9fad77c83dc28a1b1ee054f
  RUST_TOOLCHAIN: 1.97.0

jobs:
  build-arm64-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out launcher overlay
        uses: actions/checkout@v4

      - name: Check out pinned Ruffle Android
        uses: actions/checkout@v4
        with:
          repository: ruffle-rs/ruffle-android
          ref: ${{ env.RUFFLE_ANDROID_COMMIT }}
          path: ruffle-android

      - name: Apply Pixie Hollow overlay
        run: python3 pixie-hollow-android/apply_overlay.py ruffle-android

      - name: Install pinned Rust toolchain and Android target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-linux-android

      - name: Verify Rust Android target
        working-directory: ruffle-android
        run: |
          rustc --version
          rustup target list --installed
          rustup target add aarch64-linux-android --toolchain "${RUST_TOOLCHAIN}"

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ruffle-android
          shared-key: pixie-hollow-android-arm64

      - name: Install cargo-ndk
        run: cargo install cargo-ndk@${{ env.CARGO_NDK_VERSION }} --locked

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          link-to-sdk: true

      - name: Build ARM64 native library
        working-directory: ruffle-android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          unset ANDROID_SDK_ROOT
          set +e
          cargo ndk --target arm64-v8a --platform 26 -o jniLibs build --release --features jpegxr > native-build.log 2>&1
          BUILD_STATUS=$?
          set -e
          if [ "$BUILD_STATUS" -ne 0 ]; then
            echo "Native build failed. Compiler output follows:"
            tail -n 250 native-build.log
            exit "$BUILD_STATUS"
          fi
          tail -n 40 native-build.log
          mkdir -p app/src/main/jniLibs
          cp -r jniLibs/* app/src/main/jniLibs/

      - name: Upload native build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pixie-hollow-native-build-log
          path: ruffle-android/native-build.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Create build keystore
        working-directory: ruffle-android
        run: |
          keytool -genkeypair -v \
            -keystore app/androidkey.jks \
            -alias pixie_hollow_debug \
            -storepass pixie_hollow_debug \
            -keypass pixie_hollow_debug \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Pixie Hollow Android, OU=Personal Build, O=Brandon Valley, L=Eureka, S=Missouri, C=US"

      - name: Build signed ARM64 release APK
        working-directory: ruffle-android
        env:
          ABI_FILTERS: arm64-v8a
          SIGNING_KEY_ALIAS: pixie_hollow_debug
          SIGNING_STORE_PASSWORD: pixie_hollow_debug
          SIGNING_KEY_PASSWORD: pixie_hollow_debug
        run: ./gradlew assembleRelease

      - name: Prepare APK artifact
        run: |
          APK_PATH=$(find ruffle-android/app/build/outputs/apk/release -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK was produced"
            exit 1
          fi
          cp "$APK_PATH" PixieHollowAndroid-arm64-v8a.apk
          ls -lh PixieHollowAndroid-arm64-v8a.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PixieHollowAndroid-arm64-v8a
          path: PixieHollowAndroid-arm64-v8a.apk
          if-no-files-found: error
